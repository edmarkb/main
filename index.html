      <div class="header-right">
        <button id="darkModeToggle" class="theme-toggle">
          <div class="toggle-track">
            <div class="toggle-thumb" id="themeIcon"></div>
          </div>
        </button>
      </div>
    </div> 
    </div>
</header>

  <main class="device-grid" id="deviceGrid">
    
    </main>

  <div id="numbersModal" class="modal">
    <div class="modal-content">
      <h2>Alert Contacts</h2>
      <ul id="numbersList"></ul>
      <div class="input-group" style="margin-top: 20px;">
        <input type="tel" id="newNumber" placeholder="Enter phone number" maxlength="11">
      </div>
      <div class="modal-button-row">
        <button id="saveNumbersBtn" class="modal-btn cancel-style">Close</button>
        <button id="addNumberBtn" class="modal-btn save-style">Add</button>
      </div>
    </div>
  </div>

  <div id="deviceModal" class="modal">
    <div class="modal-content">
      <h2 id="deviceModalTitle">New Connection</h2>
      <div id="hardwareIndicator" class="hardware-status">
         <span class="dot"></span> 
         <span id="hardwareStatusText">Connected to ACES-1</span>
      </div>
      <div id="discoveryContainer" class="discovery-container" style="display: none;"></div>
      <div class="input-group">
        <input type="text" id="deviceNameInput" placeholder="Enter Lab Name" autocomplete="off">
      </div>
      <div class="modal-button-row">
        <button id="cancelDeviceBtn" class="modal-btn cancel-style">Cancel</button>
        <button id="confirmDeviceBtn" class="modal-btn save-style">Connect</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <h2 id="deleteModalTitle">Remove Device?</h2>
      <p id="deleteWarningText" style="margin: 25px 0; font-size: 1rem; opacity: 0.8; text-align: center;">
        Are you sure you want to remove this device?
      </p>
      <div class="modal-button-row">
        <button id="cancelDeleteBtn" class="modal-btn cancel-style">Cancel</button>
        <button id="confirmDeleteBtn" class="modal-btn delete-style">Remove</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
  <script src="js/websocket-client.js"></script>
  <script src="js/device.js"></script> 
</body>
</html>
