<script>
// Side nav collapse toggle (shared logic for non-main.js pages)
(function() {
  const sideNav = document.getElementById('sideNav');
  const toggleBtn = document.getElementById('sideNavToggle');
  if (!sideNav || !toggleBtn) return;
  // Suppress transition on load
  sideNav.style.transition = 'none';
  document.body.style.transition = 'none';
  const saved = localStorage.getItem('sideNavCollapsed');
  const isCollapsed = saved === null ? true : saved === 'true';
  if (isCollapsed) { sideNav.classList.add('collapsed'); document.body.classList.add('side-nav-collapsed'); toggleBtn.setAttribute('data-tooltip','Expand'); toggleBtn.title='Expand'; }
  else { sideNav.classList.remove('collapsed'); document.body.classList.remove('side-nav-collapsed'); toggleBtn.setAttribute('data-tooltip','Collapse'); toggleBtn.title='Collapse'; }
  requestAnimationFrame(function() { requestAnimationFrame(function() { sideNav.style.transition = ''; document.body.style.transition = ''; }); });
  toggleBtn.addEventListener('click', () => {
    const willCollapse = !sideNav.classList.contains('collapsed');
    sideNav.classList.toggle('collapsed', willCollapse);
    document.body.classList.toggle('side-nav-collapsed', willCollapse);
    localStorage.setItem('sideNavCollapsed', willCollapse);
    toggleBtn.setAttribute('data-tooltip', willCollapse ? 'Expand' : 'Collapse');
    toggleBtn.title = willCollapse ? 'Expand' : 'Collapse';
  });
})();

// Sidebar collapsed tooltip
(function() {
  let tip = null;
  function show(el) {
    const sideNav = document.getElementById('sideNav');
    if (!sideNav || !sideNav.classList.contains('collapsed')) return;
    const text = el.getAttribute('data-tooltip');
    if (!text) return;
    if (!tip) { tip = document.createElement('div'); tip.className = 'side-nav-tooltip'; document.body.appendChild(tip); }
    tip.textContent = text;
    const rect = el.getBoundingClientRect();
    tip.style.left = (rect.right + 10) + 'px';
    tip.style.top = (rect.top + rect.height / 2) + 'px';
    tip.style.transform = 'translateY(-50%)';
    tip.classList.add('visible');
  }
  function hide() { if (tip) tip.classList.remove('visible'); }
  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('[data-tooltip]');
    if (el && el.closest('.side-nav')) show(el); else hide();
  });
  document.addEventListener('mouseout', function(e) {
    const el = e.target.closest('[data-tooltip]');
    if (el && el.closest('.side-nav')) hide();
  });
})();
</script>
